resources:
  jobs:
    model_training:
      name: ${bundle.target}_model_training
      tasks:
        - task_key: fraud_detection_model
          spark_python_task:
            python_file: ../train.py
            parameters:
              - --feature-table
              - ${var.catalog}.feature_store.online_transactions
              - --registered-model-name
              - ${var.catalog}.models.fraud_detection
              - --databricks-host
              - https://dbc-0d6287ce-5988.cloud.databricks.com
              - --databricks-secret-scope
              - mlflow
              - --databricks-secret-key
              - token
              - --experiment-name
              - /Shared/fraud-training
              - --split-volume-path
              - /Volumes/${var.catalog}/models/audit
            source: WORKSPACE
          environment_key: Default
        - task_key: deploy_champion
          depends_on:
            - task_key: fraud_detection_model
          spark_python_task:
            python_file: ../src/deploy_champion.py
            parameters:
              - --registered-model-name
              - ${var.catalog}.models.fraud_detection
              - --model-alias
              - champion
              - --endpoint-name
              - ${var.endpoint_name}
            source: WORKSPACE
          environment_key: Default
      queue:
        enabled: true
      environments:
        - environment_key: Default
          spec:
            dependencies:
              - mlflow==3.14.0
              - pandas==2.3.3
              - scikit-learn==1.9.0
              - xgboost==3.3.0
            environment_version: "5"
      performance_target: PERFORMANCE_OPTIMIZED
